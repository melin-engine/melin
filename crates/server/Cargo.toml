[package]
name = "trading-server"
version = "0.1.0"
edition = "2024"

[dependencies]
trading-engine = { path = "../engine" }
trading-disruptor = { path = "../disruptor" }
trading-protocol = { path = "../protocol" }
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "sync", "macros"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tempfile = "3"
