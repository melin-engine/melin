[package]
name = "trading-server"
version = "0.1.0"
edition = "2024"

[features]
default = ["io-uring"]
## Skip all fsync calls and journal-cursor gating in the response stage.
## Unsafe for production — data may not survive crashes — but useful for
## benchmarking to isolate I/O cost from pipeline latency.
no-fsync = ["trading-engine/no-fsync"]
no-persist = ["trading-engine/no-persist"]
latency-trace = ["trading-engine/latency-trace", "trading-protocol/latency-trace"]
io-uring = ["trading-engine/io-uring", "dep:io-uring"]
pipeline-stats = ["trading-engine/pipeline-stats"]

[lib]
name = "trading_server"
path = "src/lib.rs"

[[bin]]
name = "trading-server"
path = "src/main.rs"

[dependencies]
trading-engine = { path = "../engine" }
trading-disruptor = { path = "../disruptor" }
trading-protocol = { path = "../protocol" }
blake3 = "1"
clap = { workspace = true }
ed25519-dalek = { workspace = true }
getrandom = "0.3"
libc = { workspace = true }
rand = { workspace = true }
tracing = { workspace = true }
tikv-jemallocator = { workspace = true }
tracing-subscriber = { workspace = true }
io-uring = { version = "0.7", optional = true }

[dev-dependencies]
tempfile = "3"
