[package]
name = "melin-md-gateway"
version = "0.10.1"
edition = "2024"
license-file.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "FIX 4.4 market data gateway for the Melin exchange"

[[bin]]
name = "melin-md-gateway"
path = "src/main.rs"

[dependencies]
melin-gateway-core = { path = "../gateway-core", version = "0.10.1" }
melin-market-data = { path = "../market-data", version = "0.10.1" }
melin-protocol = { path = "../protocol", version = "0.10.1" }
melin-types = { path = "../types", version = "0.10.1" }
ed25519-dalek = { workspace = true }
toml = "1"
serde = { version = "1", features = ["derive"] }
io-uring = "0.7"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
libc = { workspace = true }
