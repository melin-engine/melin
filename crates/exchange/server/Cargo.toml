[package]
name = "melin-server"
version = "0.10.1"
edition = "2024"
license-file.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Melin exchange server binary"

[features]
## Default build: release tracing + hash-chain journal.
default = ["hash-chain", "release-tracing"]
## Compile out debug! and trace! macros at build time. Eliminates the
## tracing filter check (~5-10ns) on every call site in the hot path.
## Disable with --no-default-features to get RUST_LOG=debug back.
release-tracing = ["tracing/max_level_info", "melin-server-runtime/release-tracing"]
skip-order-exec = [
    "melin-exchange-core/skip-order-exec",
    "hash-chain",
    "release-tracing",
]
no-persist = ["melin-transport-core/no-persist", "melin-server-runtime/no-persist"]
## Lightweight per-stage histograms for the original 4 stages
## (journal/matching wakeup + execute, journal batch). Adds ~3-5 mutex
## locks per event on the hot path; appropriate for narrow debugging
## ("is the journal stage slow?"). Production builds must leave this
## off — slot sizes grow by 16 bytes per InputSlot/OutputSlot to carry
## the trace timestamps.
latency-trace = [
    "melin-transport-core/latency-trace",
    "melin-server-runtime/latency-trace",
]
## Full tick-to-trade decomposition: adds 5 commercial-grade stages
## on top of latency-trace (reader: ingest, response: journal-wait,
## replica-wait, encode, egress) plus the GateCrossTracker. Roughly
## doubles the hot-path mutex traffic vs latency-trace alone, so opt
## into it explicitly when you want the breakdown — bench-side runs
## that produce the README-style decomposition table need this flag.
tick-to-trade = ["latency-trace", "melin-server-runtime/tick-to-trade"]
## Kept for backward compatibility — io_uring is now always used.
io-uring = []
dpdk = ["dep:melin-dpdk", "melin-dpdk/dpdk-sys", "melin-server-runtime/dpdk"]
pipeline-stats = [
    "melin-transport-core/pipeline-stats",
    "melin-server-runtime/pipeline-stats",
]
hash-chain = [
    "melin-journal/hash-chain",
    "melin-transport-core/hash-chain",
    "melin-server-runtime/hash-chain",
]
## Open the journal without `O_DIRECT`. Passthrough — see the
## `melin-journal` feature of the same name. Benchmarking only.
no-o-direct = [
    "melin-journal/no-o-direct",
    "melin-transport-core/no-o-direct",
    "melin-server-runtime/no-o-direct",
]

[lib]
name = "melin_server"
path = "src/lib.rs"

[[bin]]
name = "melin-server"
path = "src/main.rs"

[[bin]]
name = "melin-replication-bench"
path = "src/bin/replication-bench.rs"
required-features = ["skip-order-exec"]

[[bin]]
name = "journal-verify"
path = "src/bin/journal-verify.rs"

[dependencies]
melin-app = { path = "../../core/app", version = "0.10.1" }
melin-pipeline = { path = "../../core/pipeline", version = "0.10.1" }
melin-exchange-core = { path = "../exchange-core", version = "0.10.1" }
melin-journal = { path = "../../core/journal", version = "0.10.1" }
melin-protocol = { path = "../protocol", version = "0.10.1" }
melin-server-runtime = { path = "../../core/server-runtime", version = "0.10.1" }
melin-trading = { path = "../trading", version = "0.10.1" }
melin-transport-core = { path = "../../core/transport-core", version = "0.10.1" }
melin-types = { path = "../types", version = "0.10.1" }
melin-wire-protocol = { path = "../../core/wire-protocol", version = "0.10.1" }
melin-market-data = { path = "../market-data", version = "0.10.1" }
blake3 = "1"
clap = { workspace = true }
base64 = { workspace = true }
crc32c = "0.6"
ed25519-dalek = { workspace = true }
getrandom = "0.4"
io-uring = "0.7"
libc = { workspace = true }
rand = { workspace = true }
rustc-hash = "2"
tikv-jemallocator = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
zerocopy = { version = "0.8", features = ["derive"] }
melin-dpdk = { path = "../../core/dpdk", version = "0.10.1", optional = true }

[dev-dependencies]
bolero = "0.13"
melin-client = { path = "../client", version = "0.10.1" }
melin-journal = { path = "../../core/journal", version = "0.10.1", features = ["test-utils"] }
melin-protocol = { path = "../protocol", version = "0.10.1" }
melin-transport-core = { path = "../../core/transport-core", version = "0.10.1", features = ["test-utils"] }
ed25519-dalek = { workspace = true }
serial_test = "3"
tempfile = "3"
