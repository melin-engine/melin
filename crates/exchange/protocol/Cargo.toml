[package]
name = "melin-protocol"
version = "0.8.0"
edition = "2024"

[dependencies]
# Typed views over raw byte buffers for the wire frame header —
# replaces hand-rolled le::put / le::get pairs. derive feature for
# `FromBytes` / `IntoBytes`.
zerocopy = { version = "0.8", features = ["derive"] }
melin-types = { path = "../types" }
melin-wire-protocol = { path = "../../core/wire-protocol" }

[dev-dependencies]
bolero = "0.13"
