[package]
name = "melin-oe-gateway"
version = "0.10.0"
edition = "2024"
license-file.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "FIX 4.4 order entry gateway for the Melin exchange"

[[bin]]
name = "melin-oe-gateway"
path = "src/main.rs"

[dependencies]
melin-gateway-core = { path = "../gateway-core", version = "0.10.0" }
melin-protocol = { path = "../protocol", version = "0.10.0" }
melin-exchange-core = { path = "../exchange-core", version = "0.10.0" }
melin-types = { path = "../types", version = "0.10.0" }
ed25519-dalek = { workspace = true }
toml = "1"
serde = { version = "1", features = ["derive"] }
io-uring = "0.7"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
libc = { workspace = true }

[dev-dependencies]
proptest = "1"
