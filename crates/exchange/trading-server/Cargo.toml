[package]
name = "melin-trading-server"
version = "0.8.0"
edition = "2024"
description = "Trading-side adapter for the melin-server-runtime pipeline: ServerApp newtype, AppFactory, wire codecs, and the market-data firehose publisher."

[features]
default = ["trading"]
## Real matching engine. Mutually exclusive with `skip-order-exec`.
trading = ["dep:melin-market-data"]
## Transport-only mode — short-circuits matching. Mutually exclusive
## with `trading` at the workspace level. Used by the replication
## bench binary.
skip-order-exec = ["melin-exchange-core/skip-order-exec"]
## Per-stage histograms. Passthrough — `exchange_app.rs` toggles
## branches in `Application` impl methods based on this flag.
latency-trace = ["melin-transport-core/latency-trace"]

[dependencies]
melin-app = { path = "../../core/app" }
melin-disruptor = { path = "../../core/disruptor" }
melin-exchange-core = { path = "../exchange-core" }
melin-journal = { path = "../../core/journal" }
melin-protocol = { path = "../protocol" }
melin-wire-protocol = { path = "../../core/wire-protocol" }
melin-trading = { path = "../trading" }
melin-transport-core = { path = "../../core/transport-core" }
melin-types = { path = "../types" }
melin-market-data = { path = "../market-data", optional = true }
ed25519-dalek = { workspace = true }
getrandom = "0.4"
libc = { workspace = true }
rustc-hash = "2"
tracing = { workspace = true }

[dev-dependencies]
tempfile = "3"
melin-journal = { path = "../../core/journal", features = ["test-utils"] }
melin-transport-core = { path = "../../core/transport-core", features = ["test-utils"] }
