[package]
name = "trading-bench"
version = "0.1.0"
edition = "2024"

[features]
no-fsync = ["trading-engine/no-fsync"]
no-persist = ["trading-server/no-persist"]
latency-trace = ["trading-server/latency-trace"]
io-uring = ["trading-server/io-uring", "dep:io-uring"]
pipeline-stats = ["trading-server/pipeline-stats"]

[[bin]]
name = "trading-bench"
path = "src/main.rs"

[dependencies]
trading-engine = { path = "../engine" }
trading-disruptor = { path = "../disruptor" }
trading-protocol = { path = "../protocol" }
trading-server = { path = "../server" }
hdrhistogram = "7"
libc = { workspace = true }
tikv-jemallocator = { workspace = true }
tracing-subscriber = { workspace = true }
io-uring = { version = "0.7", optional = true }
