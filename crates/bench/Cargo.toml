[package]
name = "melin-bench"
version = "0.1.0"
edition = "2024"

[features]
default = ["io-uring"]
no-fsync = ["melin-engine/no-fsync"]
no-persist = ["melin-server/no-persist"]
latency-trace = ["melin-server/latency-trace"]
io-uring = ["melin-server/io-uring", "dep:io-uring"]
pipeline-stats = ["melin-server/pipeline-stats"]
plot = ["dep:plotters"]

[[bin]]
name = "melin-bench"
path = "src/main.rs"

[[bin]]
name = "melin-plot"
path = "src/plot.rs"
required-features = ["plot"]

[dependencies]
melin-engine = { path = "../engine" }
melin-disruptor = { path = "../disruptor" }
melin-protocol = { path = "../protocol" }
melin-server = { path = "../server" }
base64 = { workspace = true }
clap = { workspace = true }
ed25519-dalek = { workspace = true }
hdrhistogram = "7"
rand = "0.9"
libc = { workspace = true }
tikv-jemallocator = { workspace = true }
tracing-subscriber = { workspace = true }
io-uring = { version = "0.7", optional = true }
plotters = { version = "0.3", optional = true, default-features = false, features = ["svg_backend", "line_series"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
