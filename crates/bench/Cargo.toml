[package]
name = "melin-bench"
version = "0.3.0"
edition = "2024"

[features]
default = []
no-persist = ["melin-server/no-persist"]
latency-trace = ["melin-server/latency-trace"]
## Kept for backward compatibility — io_uring is now always used.
io-uring = []
dpdk = ["dep:melin-dpdk", "melin-dpdk/dpdk-sys", "dep:smoltcp"]
pipeline-stats = ["melin-server/pipeline-stats"]
plot = ["dep:plotters"]

[[bin]]
name = "melin-bench"
path = "src/main.rs"

[[bin]]
name = "melin-plot"
path = "src/plot.rs"
required-features = ["plot"]

[dependencies]
melin-engine = { path = "../engine" }
melin-trading = { path = "../trading" }
melin-disruptor = { path = "../disruptor" }
melin-protocol = { path = "../protocol" }
melin-server = { path = "../server" }
base64 = { workspace = true }
clap = { workspace = true }
ed25519-dalek = { workspace = true }
hdrhistogram = "7"
rand = "0.9"
libc = { workspace = true }
tikv-jemallocator = { workspace = true }
tracing-subscriber = { workspace = true }
io-uring = "0.7"
melin-dpdk = { path = "../dpdk", optional = true }
smoltcp = { version = "0.13", default-features = false, features = ["std", "medium-ethernet", "proto-ipv4", "socket-tcp"], optional = true }
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }
plotters = { version = "0.3", optional = true, default-features = false, features = ["svg_backend", "bitmap_backend", "bitmap_encoder", "ttf", "line_series"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
