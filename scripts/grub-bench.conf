# Kernel boot parameters for latency benchmarking.
#
# Append these to GRUB_CMDLINE_LINUX_DEFAULT in /etc/default/grub.
# Requires CONFIG_NO_HZ_FULL=y in the kernel (Ubuntu 6.8 has it).
#
# isolcpus=nohz,domain,1-6  — remove cores 1-6 from scheduler load balancing
#                              and timer tick distribution. Only explicitly
#                              pinned threads will run on these cores.
# nohz_full=1-6             — stop the timer tick on cores 1-6 when only one
#                              task is running. Eliminates ~1-10us jitter
#                              every 4ms (HZ=250).
# rcu_nocbs=1-6             — move RCU callback processing off cores 1-6.
#                              Without this, RCU grace periods can still
#                              interrupt isolated cores.
# nmi_watchdog=0             — disable NMI watchdog. Eliminates periodic
#                              non-maskable interrupts (~50-200µs stalls).
# transparent_hugepage=never — disable THP. khugepaged compaction causes
#                              1-4ms stalls on random cores.
# cpufreq.default_governor=performance — lock max CPU frequency. Eliminates
#                              frequency scaling transitions (~10-50µs).
# processor.max_cstate=1    — prevent deep C-states. C2+ wakeup costs
#                              10-100µs on modern CPUs.
# skew_tick=1                — offset timer ticks across cores to reduce
#                              kernel lock contention from synchronized ticks.
# nosmt                      — disable hyperthreading. Prevents HT siblings
#                              from polluting L1/L2 on pipeline cores.
#
# Core layout: 0=OS/IRQ/RCU, 1-3=pipeline, 4-5=readers, 6=repl-sender, 7+=bench
#
# To apply:
#   1. sudo cp /etc/default/grub /etc/default/grub.bak
#   2. Edit /etc/default/grub, append these to GRUB_CMDLINE_LINUX_DEFAULT
#   3. sudo update-grub
#   4. sudo reboot
#
# To revert:
#   sudo cp /etc/default/grub.bak /etc/default/grub && sudo update-grub && sudo reboot
#
# To validate after reboot:
#   cat /sys/devices/system/cpu/isolated      # should print: 1-6
#   cat /sys/devices/system/cpu/nohz_full     # should print: 1-6
#   cat /proc/sys/kernel/nmi_watchdog         # should print: 0
#   cat /sys/kernel/mm/transparent_hugepage/enabled  # should show [never]
#   cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor  # should print: performance
#   lscpu | grep 'Thread(s) per core'         # should print: 1
#   perf stat -e irq_vectors:local_timer_entry -C 1 -- sleep 1  # should be ~0

isolcpus=nohz,domain,1-6 nohz_full=1-6 rcu_nocbs=1-6 nmi_watchdog=0 transparent_hugepage=never cpufreq.default_governor=performance processor.max_cstate=1 skew_tick=1 nosmt
